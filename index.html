        }
        .site-subtitle {

        .control-bar {
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap;
            background: rgba(224, 192, 128, 0.1);
            border: 1px solid #e0c080; border-radius: 8px;
            padding: 15px; margin-bottom: 30px;
        }
        .cost-display {
            font-size: 1.8rem; font-weight: bold;

        }
        .cost-normal { color: #80c080; }
        .cost-warning { color: #e0e080; }
        .cost-danger { color: #e08080; }
        .stats-preview {
            display: flex; gap: 15px;
        }
        .stat-preview-item {
            text-align: center;
        }
        .stat-label {
            font-size: 0.9rem; color: #b0a060;
        }
        .stat-value {
            font-size: 1.4rem; font-weight: bold;
            color: #e0c080;
        }

            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .officer-slot {

            background: rgba(40, 40, 40, 0.8);
            border: 1px solid #e0c080; border-radius: 10px;
            padding: 20px;
        }
        .officer-header {
            display: flex; align-items: center;
            margin-bottom: 15px; gap: 15px;
        }
        .officer-avatar {
            width: 60px; height: 60px;
            border-radius: 50%; border: 2px solid #e0c080;
            display: flex; align-items: center; justify-content: center;
            background: rgba(224, 192, 128, 0.1);
            font-size: 1.5rem; color: #e0c080;
            flex-shrink: 0;
        }
        .officer-select-container { flex: 1; }
        .officer-select, .skill-select {
            width: 100%; padding: 8px 12px;
            background: #2a2a2a; color: #e0c080;
            border: 1px solid #e0c080; border-radius: 5px;
            font-size: 1rem;
        }
        
        /* 武將四維 */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(224, 192, 128, 0.05);
            border: 1px solid rgba(224, 192, 128, 0.3);
            border-radius: 5px; padding: 10px;
            text-align: center;
        }
        .stat-card .label { 
            font-size: 0.8rem; color: #b0a060; 
        }
        .stat-card .value { 
            font-size: 1.2rem; font-weight: bold; 
            color: #e0c080;
        }
        
        /* 戰法區 */
        .skill-section { margin-top: 20px; }
        .skill-item { margin-bottom: 15px; }
        .skill-label { 
            font-size: 0.9rem; color: #b0a060; 
            margin-bottom: 5px;
        }
        .skill-label .type {
            display: inline-block;
            background: rgba(224, 192, 128, 0.2);
            border-radius: 3px; padding: 1px 5px;
            font-size: 0.7rem; margin-left: 5px;
        }
        
        /* 重置按鈕 */
        .action-bar { text-align: center; }
        .btn-reset {
            background: #8b0000; color: #fff;
            border: 1px solid #e0c080; border-radius: 5px;
            padding: 10px 25px; font-size: 1rem;
            cursor: pointer; transition: background 0.3s;
        }
        .btn-reset:hover { background: #a00000; }
        
        /* 兵種標示 */
        .troop-badge {
            display: inline-block;
            padding: 2px 8px; border-radius: 10px;
            font-size: 0.7rem; margin-left: 8px;

        .troop-ninja { background: rgba(0, 0, 0, 0.5); color: #cccccc; }

            .officers-row { flex-direction: column; }
            .control-bar { flex-direction: column; gap: 15px; }
            .stats-preview { justify-content: space-around; width: 100%; }

                        </div>
                        <div class="skill-item">
                            <div class="skill-label">戰法一 <span class="type">可學習</span></div>
                            <select class="skill-select" onchange="onSkillChange(${slotId}, 1)">
                                <option value="">-- 選擇戰法 (共${skillsData.length}個) --</option>
                                ${skillsData.map(s => 
                                    `<option value="${s.id}">${s.name} (${s.type})</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div class="skill-item">
                            <div class="skill-label">戰法二 <span class="type">可學習</span></div>
                            <select class="skill-select" onchange="onSkillChange(${slotId}, 2)">
                                <option value="">-- 選擇戰法 (共${skillsData.length}個) --</option>
                                ${skillsData.map(s => 
                                    `<option value="${s.id}">${s.name} (${s.type})</option>`
                                ).join('')}
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== 核心功能 ====================
        function onOfficerChange(slotId) {
            const select = document.querySelector(`.officer-slot[data-slot="${slotId}"] .officer-select`);
            const officerId = parseInt(select.value);
            const officer = officersData.find(o => o.id === officerId);

            if (officer) {
                // 更新頭像文字
                document.getElementById(`avatarText${slotId}`).textContent = officer.name.charAt(0);
                // 更新屬性
                const statsEl = document.getElementById(`stats${slotId}`);
                statsEl.innerHTML = `
                    <div class="stat-card"><div class="label">統率</div><div class="value">${officer.stats.lead}</div></div>
                    <div class="stat-card"><div class="label">武力</div><div class="value">${officer.stats.str}</div></div>
                    <div class="stat-card"><div class="label">智力</div><div class="value">${officer.stats.int}</div></div>
                    <div class="stat-card"><div class="label">速度</div><div class="value">${officer.stats.spd}</div></div>
                `;
                // 更新固有戰法
                document.getElementById(`innate${slotId}`).value = officer.innate;
            } else {
                document.getElementById(`avatarText${slotId}`).textContent = "將";
                document.getElementById(`stats${slotId}`).innerHTML = `
                    <div class="stat-card"><div class="label">統率</div><div class="value">--</div></div>
                    <div class="stat-card"><div class="label">武力</div><div class="value">--</div></div>
                    <div class="stat-card"><div class="label">智力</div><div class="value">--</div></div>
                    <div class="stat-card"><div class="label">速度</div><div class="value">--</div></div>
                `;
                document.getElementById(`innate${slotId}`).value = "未選擇";
            }
            updateTotalCost();
            updatePreviewStats();
        }

        function onSkillChange(slotId, skillNum) {
            const select = document.querySelector(`.officer-slot[data-slot="${slotId}"] .skill-item:nth-child(${skillNum + 1}) select`);
            const skillId = parseInt(select.value);
            const skill = skillsData.find(s => s.id === skillId);
            if (skill) {
                console.log(`[戰法選擇] 武將槽 ${slotId} 戰法${skillNum}: ${skill.name} (${skill.type})`);
            }
        }

        function updateTotalCost() {
            let totalCost = 0;
            document.querySelectorAll('.officer-select').forEach(select => {
                const id = parseInt(select.value);
                if (id) {
                    const officer = officersData.find(o => o.id === id);
                    totalCost += officer.cost;
                }
            });
            
            const costElement = document.getElementById('totalCost');
            costElement.textContent = `COST: ${totalCost} / 20`;
            costElement.className = "cost-display " + 
                (totalCost > 20 ? "cost-danger" : 
                 totalCost >= 18 ? "cost-warning" : "cost-normal");
        }

        function updatePreviewStats() {
            let leadSum = 0, strSum = 0, intSum = 0, spdSum = 0;
            document.querySelectorAll('.officer-select').forEach(select => {
                const id = parseInt(select.value);
                if (id) {
                    const officer = officersData.find(o => o.id === id);
                    leadSum += officer.stats.lead;
                    strSum += officer.stats.str;
                    intSum += officer.stats.int;
                    spdSum += officer.stats.spd;
                }
            });
            document.getElementById('sumLeadership').textContent = leadSum;
            document.getElementById('sumStrength').textContent = strSum;
            document.getElementById('sumIntelligence').textContent = intSum;
            document.getElementById('sumSpeed').textContent = spdSum;
        }

        function resetTeam() {
            if (confirm('確定要重置整個隊伍嗎？所有武將和戰法選擇將被清空。')) {
                document.querySelectorAll('.officer-select').forEach(select => select.value = '');
                for (let i = 1; i <= 3; i++) {
                    document.getElementById(`avatarText${i}`).textContent = "將";
                    document.getElementById(`stats${i}`).innerHTML = `
                        <div class="stat-card"><div class="label">統率</div><div class="value">--</div></div>
                        <div class="stat-card"><div class="label">武力</div><div class="value">--</div></div>
                        <div class="stat-card"><div class="label">智力</div><div class="value">--</div></div>
                        <div class="stat-card"><div class="label">速度</div><div class="value">--</div></div>
                    `;
                    document.getElementById(`innate${i}`).value = "未選擇";
                }
                document.querySelectorAll('.skill-select').forEach(select => {
                    if (select.tagName === 'SELECT') select.value = '';
                });
                updateTotalCost();
                updatePreviewStats();
            }
        }
    </script>
</body>
</html>
