                        </div>
                        <div class="skill-item">
                            <div class="skill-label">戰法二 <span class="type">可學習</span></div>
                            <select class="skill-select" onchange="onSkillChange(${slotId}, 2)">
                                <option value="">-- 選擇戰法 (共${skillsData.length}個) --</option>
                                ${skillsData.map(s => 
                                    `<option value="${s.id}">${s.name} (${s.type}) - ${s.effect}</option>`
                                ).join('')}
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== 核心功能 ====================
        function onOfficerChange(slotId) {
            const select = document.querySelector(`.officer-slot[data-slot="${slotId}"] .officer-select`);
            const officerId = parseInt(select.value);
            const officer = officersData.find(o => o.id === officerId);

            if (officer) {
                document.getElementById(`avatarText${slotId}`).textContent = officer.name.charAt(0);
                
                const statsEl = document.getElementById(`stats${slotId}`);
                statsEl.innerHTML = `
                    <div class="stat-card"><div class="label">統率</div><div class="value">${officer.stats.lead}</div></div>
                    <div class="stat-card"><div class="label">武力</div><div class="value">${officer.stats.str}</div></div>
                    <div class="stat-card"><div class="label">智力</div><div class="value">${officer.stats.int}</div></div>
                    <div class="stat-card"><div class="label">速度</div><div class="value">${officer.stats.spd}</div></div>
                `;
                
                document.getElementById(`innate${slotId}`).value = `${officer.innate} (${officer.type})`;
            } else {
                resetSlot(slotId);
            }
            updateTotalCost();
            updatePreviewStats();
            updateRecommendations();
        }

        function onSkillChange(slotId, skillNum) {
            const select = document.querySelector(`.officer-slot[data-slot="${slotId}"] .skill-item:nth-child(${skillNum + 1}) select`);
            const skillId = parseInt(select.value);
            const skill = skillsData.find(s => s.id === skillId);
            
            if (skill) {
                console.log(`[戰法選擇] 武將槽 ${slotId} 戰法${skillNum}: ${skill.name} (${skill.type})`);
            }
            updateRecommendations();
        }

        function updateTotalCost() {
            let totalCost = 0;
            document.querySelectorAll('.officer-select').forEach(select => {
                const id = parseInt(select.value);
                if (id) {
                    const officer = officersData.find(o => o.id === id);
                    totalCost += officer.cost;
                }
            });
            
            const costElement = document.getElementById('totalCost');
            costElement.textContent = `COST: ${totalCost} / 20`;
            costElement.className = "cost-display " + 
                (totalCost > 20 ? "cost-danger" : 
                 totalCost >= 18 ? "cost-warning" : "cost-normal");
        }

        function updatePreviewStats() {
            let leadSum = 0, strSum = 0, intSum = 0, spdSum = 0;
            let officerCount = 0;
            
            document.querySelectorAll('.officer-select').forEach(select => {
                const id = parseInt(select.value);
                if (id) {
                    const officer = officersData.find(o => o.id === id);
                    leadSum += officer.stats.lead;
                    strSum += officer.stats.str;
                    intSum += officer.stats.int;
                    spdSum += officer.stats.spd;
                    officerCount++;
                }
            });
            
            document.getElementById('sumLeadership').textContent = leadSum;
            document.getElementById('sumStrength').textContent = strSum;
            document.getElementById('sumIntelligence').textContent = intSum;
            document.getElementById('sumSpeed').textContent = spdSum;
        }

        function updateRecommendations() {
            const selectedOfficers = [];
            const selectedSkills = [];
            
            document.querySelectorAll('.officer-select').forEach(select => {
                const id = parseInt(select.value);
                if (id) {
                    const officer = officersData.find(o => o.id === id);
                    selectedOfficers.push(officer);
                }
            });
            
            document.querySelectorAll('.skill-select').forEach(select => {
                if (select.tagName === 'SELECT' && select.value) {
                    const skillId = parseInt(select.value);
                    const skill = skillsData.find(s => s.id === skillId);
                    if (skill) selectedSkills.push(skill);
                }
            });
            
            const recommendGrid = document.getElementById('recommendGrid');
            recommendGrid.innerHTML = '';
            
            recommendCombos.forEach(combo => {
                const card = document.createElement('div');
                card.className = 'recommend-card';
                card.innerHTML = `
                    <div class="recommend-officer">${combo.name}</div>
                    <div class="recommend-skill">戰法組合: ${combo.skills.join(', ')}</div>
                    <div class="recommend-skill">戰術特點: ${combo.description}</div>
                `;
                recommendGrid.appendChild(card);
            });
        }

        function resetSlot(slotId) {
            document.getElementById(`avatarText${slotId}`).textContent = "將";
            document.getElementById(`stats${slotId}`).innerHTML = `
                <div class="stat-card"><div class="label">統率</div><div class="value">--</div></div>
                <div class="stat-card"><div class="label">武力</div><div class="value">--</div></div>
                <div class="stat-card"><div class="label">智力</div><div class="value">--</div></div>
                <div class="stat-card"><div class="label">速度</div><div class="value">--</div></div>
            `;
            document.getElementById(`innate${slotId}`).value = "未選擇";
        }

        function resetTeam() {
            if (confirm('確定要重置整個隊伍嗎？所有武將和戰法選擇將被清空。')) {
                document.querySelectorAll('.officer-select').forEach(select => select.value = '');
                for (let i = 1; i <= 3; i++) {
                    resetSlot(i);
                }
                document.querySelectorAll('.skill-select').forEach(select => {
                    if (select.tagName === 'SELECT') select.value = '';
                });
                updateTotalCost();
                updatePreviewStats();
                updateRecommendations();
                document.getElementById('exportResult').style.display = 'none';
            }
        }

        function exportTeam() {
            const teamData = [];
            let totalCost = 0;
            let totalLead = 0, totalStr = 0, totalInt = 0, totalSpd = 0;
            
            for (let i = 1; i <= 3; i++) {
                const select = document.querySelector(`.officer-slot[data-slot="${i}"] .officer-select`);
                const officerId = parseInt(select.value);
                
                if (officerId) {
                    const officer = officersData.find(o => o.id === officerId);
                    const skill1Select = document.querySelector(`.officer-slot[data-slot="${i}"] .skill-item:nth-child(2) select`);
                    const skill2Select = document.querySelector(`.officer-slot[data-slot="${i}"] .skill-item:nth-child(3) select`);
                    
                    const skill1Id = parseInt(skill1Select.value);
                    const skill2Id = parseInt(skill2Select.value);
                    
                    const skill1 = skill1Id ? skillsData.find(s => s.id === skill1Id) : null;
                    const skill2 = skill2Id ? skillsData.find(s => s.id === skill2Id) : null;
                    
                    teamData.push({
                        位置: i,
                        武將: officer.name,
                        COST: officer.cost,
                        兵種: officer.type,
                        固有戰法: officer.innate,
                        戰法一: skill1 ? skill1.name : '未選擇',
                        戰法二: skill2 ? skill2.name : '未選擇',
                        屬性: officer.stats
                    });
                    
                    totalCost += officer.cost;
                    totalLead += officer.stats.lead;
                    totalStr += officer.stats.str;
                    totalInt += officer.stats.int;
                    totalSpd += officer.stats.spd;
                }
            }
            
            const exportContent = `
╔════════════════════════════════════════════════════════╗
║        信長之野望 真戰 隊伍配置匯出                  ║
╠════════════════════════════════════════════════════════╣
║ 隊伍總COST: ${totalCost}/20                               ║
║ 屬性總和: 統率${totalLead} 武力${totalStr} 智力${totalInt} 速度${totalSpd} ║
╠════════════════════════════════════════════════════════╣
${teamData.map(o => `
║ 【位置${o.位置}】${o.武將} (${o.COST}C ${o.兵種})
║   固有戰法: ${o.固有戰法}
║   戰法一: ${o.戰法一}
║   戰法二: ${o.戰法二}
║   屬性: 統${o.屬性.lead} 武${o.屬性.str} 智${o.屬性.int} 速${o.屬性.spd}
╠════════════════════════════════════════════════════════╣`).join('')}
║ 匯出時間: ${new Date().toLocaleString('zh-HK')}        ║
╚════════════════════════════════════════════════════════╝
            `.trim();
            
            document.getElementById('exportContent').textContent = exportContent;
            document.getElementById('exportResult').style.display = 'block';
            
            alert('隊伍配置已匯出！可複製下方文字分享給隊友。');
        }
    </script>
</body>
</html>
